name: Compile Typst

on:
  push:
    branches: [main]
    paths:
      - "**.typ"
  pull_request:
    paths:
      - "**.typ"
  workflow_dispatch:

jobs:
  compile:
    name: Compile Typst document
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compile Typst document
        uses: typst-community/setup-typst@v4
        with:
          typst-version: latest # pin to e.g. "v0.13.1" for reproducibility

      - name: Build PDF
        run: typst compile main.typ output.pdf
        # If you need fonts from the repo or a custom directory:
        # run: typst compile --font-path ./fonts main.typ output.pdf

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: compiled-pdf
          path: output.pdf
          retention-days: 30

      # Optional: commit the PDF back to the repo (only on push to main)
      - name: Commit compiled PDF
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output.pdf
          git diff --cached --quiet || git commit -m "ci: recompile output.pdf [skip ci]"
          git push
